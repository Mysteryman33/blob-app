<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>blob · sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07070e;
      --card: rgba(255,255,255,0.045);
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.18);
      --text: #f4f4ff;
      --text-sub: rgba(255,255,255,0.42);
      --purple: #7c3aed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07070e;
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .app-bg {
      position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse 90% 55% at 10% -5%,  rgba(109,40,217,0.22) 0%, transparent 55%),
        radial-gradient(ellipse 55% 45% at 90% 105%,  rgba(37,99,235,0.13) 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 85% 10%,   rgba(192,38,211,0.08) 0%, transparent 50%),
        #07070e;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 34px 28px 30px;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    .blob-mark {
      width: 60px; height: 54px; margin: 0 auto 16px;
      display: block;
    }
    .blob-mark .body {
      fill: url(#g);
      animation: bob 3.6s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes bob { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-3px) } }
    h1 {
      font-size: 22px; font-weight: 700; text-align: center; letter-spacing: -0.02em;
    }
    .sub {
      text-align: center; color: var(--text-sub); font-size: 13.5px;
      margin-top: 6px; margin-bottom: 24px;
    }
    label {
      display: block; font-size: 12px; color: var(--text-sub);
      margin: 0 0 7px 2px; font-weight: 500;
    }
    .field { margin-bottom: 15px; }
    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 13px 15px;
      color: var(--text);
      font-size: 14.5px;
      font-family: inherit;
      transition: border-color .15s, background .15s;
      outline: none;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus {
      border-color: rgba(124,58,237,0.65);
      background: rgba(124,58,237,0.06);
    }
    button.submit {
      width: 100%;
      margin-top: 6px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      border-radius: 13px;
      padding: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform .08s, filter .15s, opacity .15s;
    }
    button.submit:hover { filter: brightness(1.08); }
    button.submit:active { transform: scale(0.985); }
    button.submit:disabled { opacity: .6; cursor: default; }
    .error {
      background: rgba(239,68,68,0.10);
      border: 1px solid rgba(239,68,68,0.30);
      color: #fca5a5;
      font-size: 13px;
      border-radius: 11px;
      padding: 10px 13px;
      margin-bottom: 15px;
      display: none;
    }
    .error.show { display: block; }
    .toggle {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-sub);
    }
    .toggle a {
      color: #b794f6;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .toggle a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="app-bg"></div>

  <div class="card">
    <svg class="blob-mark" viewBox="0 0 60 54" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#a78bfa"/>
          <stop offset="1" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
      <path class="body" d="M30 4C16 4 6 14 6 30c0 12 9 20 24 20s24-8 24-20C54 14 44 4 30 4Z"/>
      <circle cx="22" cy="28" r="3.4" fill="#0b0b14"/>
      <circle cx="38" cy="28" r="3.4" fill="#0b0b14"/>
      <path d="M24 37c2 2.4 10 2.4 12 0" stroke="#0b0b14" stroke-width="2.4" stroke-linecap="round"/>
    </svg>

    <h1 id="title">welcome back</h1>
    <p class="sub" id="subtitle">sign in to meet your blob</p>

    <div class="error" id="error"></div>

    <form id="authForm" autocomplete="on">
      <div class="field">
        <label for="email">email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com"
               autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">password</label>
        <input type="password" id="password" name="password" placeholder="••••••••"
               autocomplete="current-password" minlength="6" required />
      </div>
      <button type="submit" class="submit" id="submitBtn">sign in</button>
    </form>

    <div class="toggle" id="toggle">
      new here? <a id="toggleLink">create an account</a>
    </div>
  </div>

  <script>
    let mode = 'login';   // 'login' | 'register'
    const titleEl   = document.getElementById('title');
    const subEl     = document.getElementById('subtitle');
    const submitBtn = document.getElementById('submitBtn');
    const toggleEl  = document.getElementById('toggle');
    const errorEl   = document.getElementById('error');
    const pwInput   = document.getElementById('password');

    function setMode(next) {
      mode = next;
      hideError();
      if (mode === 'login') {
        titleEl.textContent = 'welcome back';
        subEl.textContent   = 'sign in to meet your blob';
        submitBtn.textContent = 'sign in';
        toggleEl.innerHTML  = 'new here? <a id="toggleLink">create an account</a>';
        pwInput.setAttribute('autocomplete', 'current-password');
      } else {
        titleEl.textContent = 'create your account';
        subEl.textContent   = 'your blob is waiting for you';
        submitBtn.textContent = 'create account';
        toggleEl.innerHTML  = 'have an account? <a id="toggleLink">sign in</a>';
        pwInput.setAttribute('autocomplete', 'new-password');
      }
      document.getElementById('toggleLink').addEventListener('click', () =>
        setMode(mode === 'login' ? 'register' : 'login'));
    }

    function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('show'); }
    function hideError()    { errorEl.classList.remove('show'); }

    document.getElementById('toggleLink').addEventListener('click', () =>
      setMode(mode === 'login' ? 'register' : 'login'));

    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const email    = document.getElementById('email').value.trim();
      const password = pwInput.value;
      if (!email || !password) return;

      submitBtn.disabled = true;
      const original = submitBtn.textContent;
      submitBtn.textContent = mode === 'login' ? 'signing in…' : 'creating…';

      try {
        const res = await fetch('/api/auth/' + (mode === 'login' ? 'login' : 'register'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) {
          window.location.href = '/';
          return;
        }
        showError(data.error || 'something went wrong, try again');
      } catch (err) {
        showError('network error — check your connection');
      }
      submitBtn.disabled = false;
      submitBtn.textContent = original;
    });
  </script>
</body>
</html>
